---
- name: Add Prometheus Helm repo
  kubernetes.core.helm_repository:
    name: prometheus-community
    repo_url: https://prometheus-community.github.io/helm-charts

- name: Install Prometheus stack
  kubernetes.core.helm:
    name: monitoring
    chart_ref: prometheus-community/kube-prometheus-stack
    release_namespace: "{{ monitoring_namespace }}"
    values:
      grafana:
        adminPassword: "{{ grafana_admin_password }}"
        service:
          type: NodePort
          nodePort: "{{ grafana_port }}"

- name: Wait for Grafana to be ready
  kubernetes.core.k8s_info:
    kind: Pod
    namespace: "{{ monitoring_namespace }}"
    label_selectors:
      - "app.kubernetes.io/name=grafana"
  register: grafana_pods
  until: grafana_pods.resources | selectattr('status.phase', 'equalto', 'Running') | list | length > 0
  retries: 30
  delay: 10

- name: Show monitoring status
  debug:
    msg: "Monitoring deployed. Grafana password set from vault."
