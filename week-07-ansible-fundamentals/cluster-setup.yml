---
- name: Set up Kind cluster
  hosts: local
  vars:
    cluster_name: sre-dojo
    worker_count: 2
    kind_config_path: /tmp/kind-config.yaml

  tasks:

    - name: Check if cluster already exists
      command: kind get clusters
      register: existing_clusters
      changed_when: false

    - name: Generate Kind config from template
      template:
        src: templates/kind-config.yaml.j2
        dest: "{{ kind_config_path }}"
        mode: '0644'
      when: cluster_name not in existing_clusters.stdout

    - name: Create Kind cluster
      command: "kind create cluster --name {{ cluster_name }} --config {{ kind_config_path }}"
      when: cluster_name not in existing_clusters.stdout

    - name: Wait for cluster to be ready
      command: kubectl wait --for=condition=Ready nodes --all --timeout=120s
      changed_when: false
      when: cluster_name not in existing_clusters.stdout

    - name: Show cluster info
      command: kubectl get nodes -o wide
      register: cluster_info
      changed_when: false

    - name: Display cluster status
      debug:
        msg: "{{ cluster_info.stdout_lines }}"
