---
- name: Deploy nginx app to Kubernetes
  hosts: local
  vars:
    app_name: hello-nginx
    app_namespace: demo
    replica_count: 5
    service_port: 80
    node_port: 30080

  tasks:

    - name: Create namespace
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Namespace
          metadata:
            name: "{{ app_namespace }}"

    - name: Create Deployment
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: "{{ app_name }}"
            namespace: "{{ app_namespace }}"
          spec:
            replicas: "{{ replica_count }}"
            selector:
              matchLabels:
                app: "{{ app_name }}"
            template:
              metadata:
                labels:
                  app: "{{ app_name }}"
              spec:
                containers:
                - name: nginx
                  image: nginx:alpine
                  ports:
                  - containerPort: 80

    - name: Create Service
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Service
          metadata:
            name: "{{ app_name }}"
            namespace: "{{ app_namespace }}"
          spec:
            type: NodePort
            selector:
              app: "{{ app_name }}"
            ports:
            - port: "{{ service_port }}"
              targetPort: 80
              nodePort: "{{ node_port }}"

    - name: Wait for pods to be ready
      kubernetes.core.k8s_info:
        kind: Pod
        namespace: "{{ app_namespace }}"
        label_selectors:
          - "app={{ app_name }}"
      register: pod_info
      until: pod_info.resources | length >= replica_count | int and (pod_info.resources | selectattr('status.phase', 'equalto', 'Running') | list | length) >= replica_count | int
      retries: 30
      delay: 5

    - name: Show deployment info
      debug:
        msg: "Deployed {{ pod_info.resources | length }} pods for {{ app_name }}"
