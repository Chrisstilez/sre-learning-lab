apiVersion: apps/v1
kind: Deployment
metadata:
  name: logger-app
  namespace: default
  labels:
    app: logger-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: logger-app
  template:
    metadata:
      labels:
        app: logger-app
    spec:
      containers:
      - name: logger-app
        image: christopher95/logger-app:v1
        ports:
        - containerPort: 8080
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 100m
            memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: logger-app
  namespace: default
spec:
  type: NodePort
  selector:
    app: logger-app
  ports:
  - port: 8080
    targetPort: 8080
    nodePort: 30089
